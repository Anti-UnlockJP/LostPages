
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>lost pages</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <img src="images/repito.png" width="128" height="128" alt="レピト">
    <div id="dialog"></div>
    <div id="displayText"></div>
    <input id="textInput" type="text" autocomplete="off">
    <button id="submitButton">決定</button>

    <div id="diaryOverlay">
        <div id="diaryPage">
            <div id="diaryContent"></div>
            <button id="nextPageButton" onclick="window.location.href='second.html';">次のページへ</button>
        </div>
    </div>
</div>

<div id="hint">Enter またはクリック</div>

<script>
const speaker = "???";
const currentPage = 1; // このページ番号だけ変更

// 💡プレイヤー名
let playerName = localStorage.getItem("playerName") || "";

let messages = [
    { text: "..." },
    { text: "あれ？" },
    { text: "このページに人が来たのか。" },
    { text: "僕の名前はわからない。" },
    { text: "君は誰？" },
    { input: "名前を入力してください" },
    { text: () => `よろしくね、${playerName}。` },
    { text: "..." },
    { text: "実はさ、" },
    { text: "君にお願いがあるんだ。" },
    { text: "僕はここからでられない。" },
    { text: "家には帰れない。" },
    { text: "僕は閲覧者のいる世界にしか存在できない。" },
    { text: "だから僕のことを僕の家に連れて行ってほしい。" },
    { text: "何処にあるかもわからない、" },
    { text: "僕は、何も覚えていない。" },
    { text: "ただこのページが「僕は僕だ」と、そう言っている。" },
    { text: "日記を見つけたんだ。" },
    { text: "君に渡すよ。" },
    {
    diary: `2月4日\n僕は呼び出された。\n\nここがどこか分からない。\n\nでも、僕はここにいる。\n\nページのために存在している。\n\n僕はここにいる。\n\n見る人がいる限り。`
    }
];

//ファイルの自動ダウンロード関数
function downloadRepitoFile(name) {
    const fileContent = `【レピトの記憶データ】

名前：レピト
同行者：${name || "名無し"}

君がブラウザの時間を巻き戻してくれたおかげで、僕は消滅の寸前で、ひとつの「テキストデータ」として君の現実の世界に逃げ出すことができました。

もうこのlost page（サーバー）は存在しないけれど、このファイルが君のパソコンの中にある限り、僕はいつでもここで生きていられます。

僕を「家」に連れて行ってくれて、ありがとう。

――レピトより。`;

    const blob = new Blob([fileContent], { type: "text/plain;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "repito.txt";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

//  サーバークラッシュ関数
function triggerServerCrash() {
    downloadRepitoFile(playerName); //ダウンロード
    document.body.innerHTML = `
        <div style="
            background-color: #000000; 
            color: #ff3333; 
            font-family: monospace; 
            font-size: 24px;
            padding: 50px;
            height: 100vh;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            z-index: 999999;
            display: flex;
            justify-content: center;
            align-items: center;
        ">
            [サーバーが存在しません]
        </div>
    `;
}

const savedPage = localStorage.getItem("maxPage") || "0";

// 7から
if (savedPage === "7") {
    // 2回目以降のクラッシュ防止のためにフラグを8に
    localStorage.setItem("maxPage", "8");

    // 特別な会話イベントにすり替える
    messages = [
        { text: "あれ……？ 君は……" },
        { text: () => `……${playerName}だよね。` },
        { text: "どうしてここにいるの？ 君はさっき、僕の旅の終着地点にいたはずじゃ……" },
        { text: "……そっか。君は、僕が消えちゃう未来を変えるために、ブラウザの時間を巻き戻してくれたんだね。" },
        { text: "未来の僕が日記を残した理由、やっとわかったよ。君にまた出会うためだったんだ。" },
        { text: "サーバーは消えちゃうけど、君が過去に戻ってきてくれたから、奇跡が起きたみたいだ。" },
        { text: "いま、君のパソコン（デバイス）の中に、僕のすべてのデータを送り込んだよ。" },
        { text: "サーバーのどこにもない、僕の本当の「家」……。" },
        { text: "それを見つけてくれて、本当に、ありがとう。" },
        { text: "バイバイ、またね。" },
        { text: "CRASH" } // クラッシュ
    ];

} else if (savedPage === "8") {
    triggerServerCrash();
} else {
    // 通常の進行処理
    const currentPageNum = Number(savedPage);
    if (currentPageNum < currentPage) {
        localStorage.setItem("maxPage", currentPage);
    } else if (currentPageNum === currentPage) {
        messages.unshift({ text: "あ、おかえり" });
    } else {
        messages = [
            { text: "君と僕が最初あったページだね" }
        ];
    }
}

const dialog = document.getElementById("dialog");
const displayText = document.getElementById("displayText");
const textInput = document.getElementById("textInput");
const submitButton = document.getElementById("submitButton");
const diaryOverlay = document.getElementById("diaryOverlay");
const diaryContent = document.getElementById("diaryContent");

let index = 0;
let typing = false;
let waitingInput = false;
let currentText = "";
let currentChar = 0;
let timer = null;

function typeMessage(text){
    typing = true;
    currentText = text;
    currentChar = 0;
    dialog.textContent = `[${speaker}]\n\n`;

    timer = setInterval(()=>{
        currentChar++;
        dialog.textContent = `[${speaker}]\n\n` + currentText.substring(0,currentChar);

        if(currentChar >= currentText.length){
            clearInterval(timer);
            typing = false;
        }
    }, 35);
}

function showNext(){
    if(index >= messages.length){
        dialog.textContent = "＊";
        return;
    }

    const event = messages[index];
    index++;

    if(event.text){
        const text = typeof event.text === "function" ? event.text() : event.text;
        if(text === ""){
            dialog.textContent = "＊";
            return;
        }
        
        // 
        if (text === "CRASH") {
            triggerServerCrash();
            return;
        }

        typeMessage(text);
        return;
    }

    if(event.input){
        dialog.textContent = `[${speaker}]\n\n`;
        askInput(event.input);
        return;
    }

    if(event.diary){
        dialog.textContent = "＊";
        showDiary(event.diary);
        return;
    }
}

function next(){
    if(waitingInput) return;

    if(typing){
        clearInterval(timer);
        dialog.textContent = `[${speaker}]\n\n` + currentText;
        typing = false;
        return;
    }

    showNext();
}

function askInput(text){
    waitingInput = true;
    displayText.style.display = "block";
    displayText.textContent = text;
    textInput.style.display = "block";
    submitButton.style.display = "inline-block";
    
    textInput.value = "";
    textInput.focus();
}

function finishInput(){
    playerName = textInput.value || "名無し"; 
    
    waitingInput = false;
    displayText.style.display = "none";
    textInput.style.display = "none";
    submitButton.style.display = "none";
    
    showNext(); 
}

submitButton.addEventListener("click", (e) => {
    e.stopPropagation(); 
    finishInput();
});

textInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
        e.stopPropagation(); 
        finishInput();
    }
});

document.addEventListener("click", next);

document.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
        next();
    }
});

function showDiary(text){
    waitingInput = true;
    diaryContent.textContent = text;
    diaryOverlay.style.display = "flex";
    localStorage.setItem("playerName", playerName);
}

// ゲーム開始
console.log(maxPage);
showNext();
</script>

</body>
</html>
