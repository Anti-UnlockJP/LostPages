<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>lost pages</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <img src="images/repito.png" width="128" height="128" alt="レピト">
    <div id="dialog"></div>
    <div id="displayText"></div>
    <input id="textInput" type="text" autocomplete="off">
    <button id="submitButton">決定</button>

    <div id="diaryOverlay">
        <div id="diaryPage">
            <div id="diaryContent"></div>
            <button id="nextPageButton" onclick="window.location.href='438abab7-19b6-44fc-a3e4-55cd52ac089c.html';">次のページへ</button>
        </div>
    </div>
</div>
<div id="hint">Enter またはクリック</div>


<script>
const speaker = "レピト";

const currentPage = 4; // このページ番号だけ変更



// messages配列の構成
let messages = [
    { text: "なんで僕日記持ってたんだろ" },
    { text: "なんか名前を思い出したら" },
    { text: "もうすでに持っていて..." },
    { text: "..." },
    { text: "気味が悪いな" },
    { text: "あれ？" },
    { text: "このページパスワードが必要だって.." },
    { text: "知らないよ...そんなの" },
    { text: () => `${playerName}は見た？それっぽいもの` },
    { text: "前のページに戻っても" },
    { text: "なんだっけ、ブラウザー？っていうので君は僕と会話できているんだよね？" },
    { text: "前に戻るようにここにも戻ってこれるらしいから" },
    { text: "探しに行っても大丈夫だよ" },
    { input: "パスワードを入力してください" },
    { text: "お、あってるっぽい"},
    { text: "あ、日記があるね"},
    {
    diary: `2月6日\nかんりしゃは戻ってきた。\nただつらそうな顔をしている\n僕は何もできないけど、かんりしゃのことを思っている\nかんりしゃはたまに別の人と会話をしている。\n画面越しに怒られているのが見える。\nかんりしゃは僕のことを心配してくれている。\n僕はかんりしゃのことを心配している。\nかんりしゃは僕のことを思ってくれている。\n僕はかんりしゃのことを思っている。`
    }
];

const savedPage = Number(localStorage.getItem("maxPage") || 0);

console.log(savedPage);
        if (savedPage == 7) {
            triggerServerCrash();
            console.log("maxPage is 7, triggering server crash");
        }

if (savedPage < currentPage) {

    // 初めてこのページまで来た

    localStorage.setItem("maxPage", currentPage);



} else if (savedPage === currentPage) {

    // 同じページに戻ってきた

    messages.unshift({ text: "あ、おかえり" });



} else {

    // より先まで進んだあと、この前のページへ戻ってきた

    messages = [

        { text: "あ、戻ってきたね" }

    ];

}

const dialog = document.getElementById("dialog");
const displayText = document.getElementById("displayText");
const textInput = document.getElementById("textInput");
const submitButton = document.getElementById("submitButton");
const diaryOverlay = document.getElementById("diaryOverlay");
const diaryContent = document.getElementById("diaryContent");

let playerName = localStorage.getItem("playerName"); 
let index = 0;
let typing = false;
let waitingInput = false;

let currentText = "";
let currentChar = 0;
let timer = null;
function triggerServerCrash() {
    document.body.innerHTML = `
        <div style="
            background-color: #000000; 
            color: #ff3333; 
            font-family: monospace; 
            font-size: 24px;
            padding: 50px;
            height: 100vh;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            z-index: 999999;
            display: flex;
            justify-content: center;
            align-items: center;
        ">
            [サーバーが存在しません]
        </div>
    `;
}
function typeMessage(text){
    typing = true;
    currentText = text;
    currentChar = 0;
    dialog.textContent = `[${speaker}]\n\n`;

    timer = setInterval(()=>{
        currentChar++;
        dialog.textContent = `[${speaker}]\n\n` + currentText.substring(0,currentChar);

        if(currentChar >= currentText.length){
            clearInterval(timer);
            typing = false;
        }
    }, 35);
}

function showNext(){
    if(index >= messages.length){
        dialog.textContent = "＊";
        return;
    }

    const event = messages[index];
    index++;

    if(event.text){
        const text = typeof event.text === "function" ? event.text() : event.text;
        if(text === ""){
            dialog.textContent = "＊";
            return;
        }
        
        //再度名前入力を求める場合の処理
        if(text === "なんか...違う気がする") {
            index = messages.length - 10; //戻す
        }

        typeMessage(text);
        return;
    }

    if(event.input){
        dialog.textContent = `[${speaker}]\n\n`;
        askInput(event.input);
        return;
    }

    if(event.diary){
        dialog.textContent = "＊";
        showDiary(event.diary);
        return;
    }
}

function next(){
    if(waitingInput) return;

    if(typing){
        clearInterval(timer);
        dialog.textContent = `[${speaker}]\n\n` + currentText;
        typing = false;
        return;
    }

    showNext();
}

function askInput(text){
    waitingInput = true;
    displayText.style.display = "block";
    displayText.textContent = text;
    textInput.style.display = "block";
    submitButton.style.display = "inline-block";
    
    textInput.value = "";
    textInput.focus();
}

function finishInput(){
    const inputVal = textInput.value.trim();

    if(inputVal === "F23gOd_Gz"){
        waitingInput = false;
        displayText.style.display = "none";
        textInput.style.display = "none";
        submitButton.style.display = "none";

        showNext();
    } else {
        dialog.textContent = `[${speaker}]\n\nパスワードが違うみたい...`;

        textInput.value = "";
        textInput.focus();
    }
}

submitButton.addEventListener("click", (e) => {
    e.stopPropagation(); 
    finishInput();
});

textInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
        e.stopPropagation(); 
        finishInput();
    }
});

document.addEventListener("click", next);

document.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
        next();
    }
});

function showDiary(text){
    waitingInput = true; 
    diaryContent.textContent = text;
    diaryOverlay.style.display = "flex";
}

// ゲーム開始
showNext();
</script>


</body>
</html>
